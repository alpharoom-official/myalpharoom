<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY ALPHA ROOM | COMING SOON</title>
    <style>
        body { background: #0a0a0a; color: #ffffff; font-family: 'Arial Black', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; border: 2px solid #ffcc00; padding: 50px; border-radius: 20px; background: rgba(255,204,0,0.05); box-shadow: 0 0 50px rgba(255,204,0,0.1); }
        .logo { font-size: 4rem; font-weight: 900; color: #ffcc00; text-shadow: 0 0 20px rgba(255,204,0,0.5); margin: 0; letter-spacing: -2px; }
        .status { background: #ff4444; color: white; padding: 5px 15px; font-size: 1rem; border-radius: 5px; margin-top: 20px; display: inline-block; animation: blink 1s infinite; }
        h2 { font-size: 1.5rem; color: #888; margin-top: 30px; text-transform: uppercase; }
        .message { font-family: 'Helvetica', sans-serif; color: #bbb; max-width: 400px; line-height: 1.6; margin: 20px auto; font-style: italic; }
        .countdown { font-size: 1.2rem; color: #ffcc00; margin-top: 20px; font-weight: bold; border-top: 1px solid #333; padding-top: 20px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">MY ALPHA ROOM</h1>
        <div class="status">SITO IN COSTRUZIONE</div>
        
        <h2>FASE BETA IN ARRIVO</h2>
        <p class="message">
            Stiamo trasferendo i sistemi su server proprietari ultra-veloci.<br>
            Il lancio della versione 1.0 con <strong>Matching Casuale 1vs1</strong> è previsto nei prossimi giorni.
        </p>

        <div class="countdown">STAY TUNED. IL POTERE È IN ARRIVO.</div>
    </div>

    <footer style="position: absolute; bottom: 20px; color: #444; font-size: 0.8rem;">
        &copy; 2026 ALPHA ROOM PROJECT - ICELAND SERVERS READY
    </footer>
</body>
</html>
